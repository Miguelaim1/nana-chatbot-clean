<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nana Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }

    #chat {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 16px;
      min-height: 260px;
      margin-bottom: 12px;
      background: #fafafa;
      overflow-y: auto;
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 240px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      color: #555;
      font-size: 14px;
      margin-top: 8px;
    }

    p {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <h2>Nana Chatbot 4🌸</h2>
  <p>Speak in simple English. Nana will answer in short English.</p>

  <div id="chat"></div>

  <div class="row">
    <input id="input" type="text" placeholder="Type here..." />
    <button id="sendButton" type="button">Send</button>
  </div>

  <div class="row">
    <button id="micButton" type="button">🎤 Start speaking</button>
    <button id="stopVoiceButton" type="button">🔇 Stop voice</button>
  </div>

  <div id="status">Ready.</div>

  <script>
    const chat = document.getElementById("chat");
    const inputBox = document.getElementById("input");
    const statusBox = document.getElementById("status");
    const sendButton = document.getElementById("sendButton");
    const micButton = document.getElementById("micButton");
    const stopVoiceButton = document.getElementById("stopVoiceButton");

    let currentAudio = null;
    let isSending = false;

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function addChatLine(label, text) {
      chat.innerHTML += `<p><b>${label}</b> ${escapeHtml(text)}</p>`;
      chat.scrollTop = chat.scrollHeight;
    }

    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }
    }

    function playAudio(base64Audio) {
      stopAudio();
      currentAudio = new Audio(`data:audio/mp3;base64,${base64Audio}`);
      currentAudio.play().catch((error) => {
        statusBox.textContent = "Audio play error: " + error.message;
      });
    }

    async function sendMessage(messageOverride = null) {
      if (isSending) return;

      const message = (messageOverride ?? inputBox.value).trim();
      if (!message) return;

      isSending = true;
      sendButton.disabled = true;
      micButton.disabled = true;

      addChatLine("You:", message);
      inputBox.value = "";
      statusBox.textContent = "Thinking...";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        if (!response.ok) {
          addChatLine("Error:", data.error || "Unknown error");
          statusBox.textContent = "Error.";
          return;
        }

        const reply = data.reply || "No reply generated.";
        addChatLine("Nana:", reply);

        if (data.audio) {
          statusBox.textContent = "Nana is speaking...";
          playAudio(data.audio);
        } else {
          statusBox.textContent = "Nana replied.";
        }
      } catch (error) {
        addChatLine("Error:", error.message);
        statusBox.textContent = "Network error.";
      } finally {
        isSending = false;
        sendButton.disabled = false;
        micButton.disabled = false;
      }
    }

    sendButton.addEventListener("click", function () {
      sendMessage();
    });

    inputBox.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    stopVoiceButton.addEventListener("click", function () {
      stopAudio();
      statusBox.textContent = "Voice stopped.";
    });

    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    let recognition = null;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = function () {
        statusBox.textContent = "Listening...";
      };

      recognition.onresult = function (event) {
        const transcript = event.results[0][0].transcript;
        statusBox.textContent = "Heard: " + transcript;
        sendMessage(transcript);
      };

      recognition.onerror = function (event) {
        statusBox.textContent = "Mic error: " + event.error;
      };

      recognition.onend = function () {
        if (statusBox.textContent === "Listening...") {
          statusBox.textContent = "Stopped listening.";
        }
      };

      micButton.addEventListener("click", function () {
        if (isSending) return;

        stopAudio();

        try {
          recognition.start();
          statusBox.textContent = "Trying to listen...";
        } catch (error) {
          statusBox.textContent = "Mic start error: " + error.message;
        }
      });
    } else {
      micButton.disabled = true;
      statusBox.textContent = "Speech recognition is not supported in this browser. Try Chrome.";
    }
  </script>
</body>
</html>
